<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>노후 수입 설계 MVP</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Korea retirement income projection</p>
        <h1>노후 월수입 프로젝션</h1>
        <p>
          현재 재직 수입부터 퇴직금, 연금, IRP, 금융자산 인출까지 본인이
          100세가 되는 해까지 월별 세후 현금흐름을 계산합니다.
        </p>
      </section>

      <section class="grid">
        <form id="projection-form" class="panel">
          <h2>기본 입력</h2>
          <label>
            본인 생년월일
            <input name="user_birth_date" type="date" value="1975-04-15" required />
          </label>
          <label>
            배우자 생년월일
            <input name="spouse_birth_date" type="date" value="1978-09-10" />
          </label>
          <label>
            분석 시작 월
            <input name="start_month" type="month" value="2026-04" required />
          </label>
          <label>
            은퇴 목표 연령
            <input name="retirement_age" type="number" value="60" min="40" max="90" />
          </label>
          <label>
            퇴직 후 목표 월수입
            <input name="target_monthly_income" type="text" inputmode="numeric" value="4,500,000" data-format="money" />
          </label>

          <h2>재직 및 퇴직 이벤트</h2>
          <label>
            현재 월 세후 근로소득
            <input name="monthly_net_income" type="text" inputmode="numeric" value="5,200,000" data-format="money" />
          </label>
          <label>
            근로소득 연 상승률(%)
            <input name="income_growth_rate" type="number" value="2" step="0.1" />
          </label>
          <label>
            예상 퇴직금
            <input name="retirement_allowance" type="text" inputmode="numeric" value="120,000,000" data-format="money" />
          </label>
          <label>
            희망퇴직위로금
            <input name="voluntary_retirement_bonus" type="text" inputmode="numeric" value="40,000,000" data-format="money" />
          </label>

          <h2>부동산 월수입</h2>
          <label>
            월 임대/사업 수입
            <input name="real_estate_income" type="text" inputmode="numeric" value="1,300,000" data-format="money" />
          </label>
          <label>
            월 부동산 비용
            <input name="real_estate_expense" type="text" inputmode="numeric" value="350,000" data-format="money" />
          </label>
          <label>
            부동산 수입 연 상승률(%)
            <input name="real_estate_growth" type="number" value="1.5" step="0.1" />
          </label>

          <h2>연금</h2>
          <label>
            국민연금 정상 월수령액
            <input name="national_pension_amount" type="text" inputmode="numeric" value="1,500,000" data-format="money" />
          </label>
          <label>
            국민연금 선택 개시 연령
            <input name="national_pension_start_age" type="number" value="65" min="55" max="75" />
          </label>
          <label>
            주택연금 월수령액
            <input name="housing_pension_amount" type="text" inputmode="numeric" value="900,000" data-format="money" />
          </label>
          <label>
            주택연금 개시 연령
            <input name="housing_pension_start_age" type="number" value="70" min="55" max="95" />
          </label>

          <h2>IRP 및 투자자산</h2>
          <label>
            IRP 현재 잔액
            <input name="irp_balance" type="text" inputmode="numeric" value="50,000,000" data-format="money" />
          </label>
          <label>
            IRP 월 납입 계획
            <input name="irp_contribution" type="text" inputmode="numeric" value="500,000" data-format="money" />
          </label>
          <label>
            IRP 연 예상수익률(%)
            <input name="irp_return" type="number" value="4" step="0.1" />
          </label>
          <label>
            주식/투자 현재 잔액
            <input name="stock_balance" type="text" inputmode="numeric" value="80,000,000" data-format="money" />
          </label>
          <label>
            주식/투자 연 예상수익률(%)
            <input name="stock_return" type="number" value="5" step="0.1" />
          </label>
          <label>
            배당/이자 월수입
            <input name="monthly_financial_income" type="text" inputmode="numeric" value="200,000" data-format="money" />
          </label>

          <h2>가정</h2>
          <label>
            물가상승률(%)
            <input name="inflation_rate" type="number" value="2" step="0.1" />
          </label>

          <button type="submit">프로젝션 계산</button>
        </form>

        <section class="panel results">
          <h2>결과</h2>
          <div id="summary" class="summary muted">입력 후 계산 버튼을 누르세요.</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>월</th>
                  <th>나이</th>
                  <th>명목수입</th>
                  <th>실질수입</th>
                  <th>부족액</th>
                  <th>금융자산</th>
                </tr>
              </thead>
              <tbody id="monthly-rows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
